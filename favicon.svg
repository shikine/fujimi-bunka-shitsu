<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8E8F8"/>
      <stop offset="100%" stop-color="#E8F6FC"/>
    </linearGradient>
    <linearGradient id="mt" x1="0.3" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A6B9A"/>
      <stop offset="100%" stop-color="#6B8FBF"/>
    </linearGradient>
  </defs>

  <!-- 背景: 空 -->
  <rect width="32" height="32" fill="url(#sky)" rx="6"/>

  <!-- 富士山 本体 -->
  <polygon points="16,3 1,29 31,29" fill="url(#mt)"/>

  <!-- 山の右側ハイライト -->
  <polygon points="16,3 22,16 31,29 16,29" fill="#5A7FAF" opacity="0.4"/>

  <!-- 雪冠 -->
  <path d="M16,3 L10.5,12.5 Q12,11.5 13.5,13 Q14.5,11 16,12 Q17.5,11 18.5,13 Q20,11.5 21.5,12.5 Z" fill="white"/>

  <!-- 雪の広がり (裾野) -->
  <path d="M10.5,12.5 Q9,14 9.5,15.5 L16,13 L22.5,15.5 Q23,14 21.5,12.5 Q20,11.5 18.5,13 Q17.5,11 16,12 Q14.5,11 13.5,13 Q12,11.5 10.5,12.5 Z" fill="white" opacity="0.85"/>

  <!-- 地平線 / 地面 -->
  <rect x="0" y="27" width="32" height="5" rx="0" fill="#6BCB77" opacity="0.8"/>
  <rect x="0" y="28.5" width="32" height="3.5" rx="0" fill="#5AB866" opacity="0.9"/>
</svg>
